{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kbee Admin Login</title>
    <link rel="stylesheet" href="{% static 'admin/css/base.css' %}">
    <style>
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: linear-gradient(135deg, #0f172a, #1f2937 52%, #ca8a04); font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .login-box { width: min(420px, calc(100% - 32px)); background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,.32); }
      .brand { padding: 28px 28px 20px; background: #111827; color: #fff; }
      .brand h1 { margin: 0; font-size: 24px; }
      .brand p { margin: 8px 0 0; color: #d1d5db; }
      form { padding: 28px; display: grid; gap: 16px; }
      label { font-weight: 700; color: #1f2937; font-size: 14px; }
      input { width: 100%; box-sizing: border-box; border: 1px solid #d1d5db; border-radius: 8px; min-height: 44px; padding: 10px 12px; font-size: 15px; }
      button { border: 0; border-radius: 8px; min-height: 46px; background: #ca8a04; color: #111827; font-weight: 800; cursor: pointer; }
      .message { padding: 10px 12px; border-radius: 8px; background: #fef2f2; color: #991b1b; font-size: 14px; }
    </style>
  </head>
  <body>
    <section class="login-box">
      <div class="brand">
        <h1>Kbee Admin</h1>
        <p>Sign in with your staff account to continue.</p>
      </div>
      <form method="post" action="{% url 'admin:login' %}">
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
        {% if messages %}
          {% for message in messages %}<div class="message">{{ message }}</div>{% endfor %}
        {% endif %}
        <div>
          <label for="id_username">Username</label>
          <input id="id_username" name="username" type="text" autocomplete="username" required autofocus>
        </div>
        <div>
          <label for="id_password">Password</label>
          <input id="id_password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button type="submit">Continue</button>
      </form>
    </section>
  </body>
</html>
